{% extends "base.html" %}
{% block title %}Alarm Log - victron-bm-webui{% endblock %}

{% block content %}
<!-- Header & filters -->
<div class="row g-3 mb-4 align-items-end">
    <div class="col-12 col-md-auto">
        <h4 class="mb-0">
            <i class="bi bi-bell text-primary me-2"></i>Alarm Log
        </h4>
    </div>
    <div class="col-12 col-md-auto ms-md-auto">
        <div id="time-range-btns" class="btn-group w-100" role="group">
            <button type="button" class="btn btn-outline-primary btn-sm" data-range="1h">1h</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-range="6h">6h</button>
            <button type="button" class="btn btn-outline-primary btn-sm active" data-range="24h">24h</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-range="7d">7d</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-range="30d">30d</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-range="all">All</button>
        </div>
    </div>
</div>

<!-- Alarm table -->
<div class="row">
    <div class="col">
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Type</th>
                            <th class="d-none d-md-table-cell">Message</th>
                            <th class="text-center">Notified</th>
                        </tr>
                    </thead>
                    <tbody id="alarm-table-body">
                        <tr>
                            <td colspan="4" class="text-center text-body-secondary py-4">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading alarms...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Pagination & status -->
<div class="row mt-3">
    <div class="col-auto">
        <div id="pagination-btns" class="btn-group btn-group-sm" style="display: none;">
            <button id="btn-prev" class="btn btn-outline-secondary" disabled>
                <i class="bi bi-chevron-left"></i> Prev
            </button>
            <button id="btn-page-info" class="btn btn-outline-secondary" disabled></button>
            <button id="btn-next" class="btn btn-outline-secondary" disabled>
                Next <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>
    <div class="col text-end text-body-secondary">
        <small id="alarm-status">Loading...</small>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/alarm_log.js') }}"></script>
{% endblock %}
