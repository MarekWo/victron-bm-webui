services:
  victron-bm-webui:
    build: .
    container_name: victron-bm-webui
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:${APP_PORT:-80}"
    volumes:
      - ./data:/data
      - ./config:/app/config
    environment:
      - TZ=${TZ:-Europe/Warsaw}
      - APP_PORT=${APP_PORT:-80}
      - DEVICE_MOCK=${DEVICE_MOCK:-true}
      - BLE_MAC_ADDRESS=${BLE_MAC_ADDRESS:-}
      - BLE_ADV_KEY=${BLE_ADV_KEY:-}
      - SMTP_ENABLED=${SMTP_ENABLED:-}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-}
      - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL:-}
      - SMTP_RECIPIENTS=${SMTP_RECIPIENTS:-}
      - PUSHOVER_ENABLED=${PUSHOVER_ENABLED:-}
      - PUSHOVER_TOKEN=${PUSHOVER_TOKEN:-}
      - PUSHOVER_USER=${PUSHOVER_USER:-}
      - PRIORITY_AC_POWER_LOST=${PRIORITY_AC_POWER_LOST:-}
      - PRIORITY_AC_POWER_RESTORED=${PRIORITY_AC_POWER_RESTORED:-}
      - PRIORITY_LOW_VOLTAGE=${PRIORITY_LOW_VOLTAGE:-}
      - PRIORITY_HIGH_VOLTAGE=${PRIORITY_HIGH_VOLTAGE:-}
      - PRIORITY_LOW_SOC=${PRIORITY_LOW_SOC:-}
      - PRIORITY_HIGH_TEMPERATURE=${PRIORITY_HIGH_TEMPERATURE:-}
      - PRIORITY_LOW_TEMPERATURE=${PRIORITY_LOW_TEMPERATURE:-}
      - PRIORITY_DEVICE_OFFLINE=${PRIORITY_DEVICE_OFFLINE:-}
      - PRIORITY_DEVICE_ONLINE=${PRIORITY_DEVICE_ONLINE:-}
      - PRIORITY_WATCHDOG_RESTART=${PRIORITY_WATCHDOG_RESTART:-}
